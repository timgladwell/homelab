# Podinfo Ingress
#
# Routes:
# - http://<IP>/podinfo/*           -> podinfo service (strips /podinfo prefix)
# - http://<DOMAIN>/podinfo/*       -> podinfo service (strips /podinfo prefix)
# - http://podinfo.<DOMAIN>/*       -> podinfo service (no prefix to strip)
#
# Podinfo shows its default UI at /
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podinfo
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.middlewares: default-podinfo-stripprefix@kubernetescrd
spec:
  rules:
    # Path-based routing: http://<IP>/podinfo
    - http:
        paths:
          - path: /podinfo
            pathType: Prefix
            backend:
              service:
                name: podinfo
                port:
                  number: 9898
    # Subdomain routing: http://podinfo.<DOMAIN>
    # Uncomment when DNS is configured (no middleware needed - no prefix to strip)
    # - host: podinfo.PLACEHOLDER_DOMAIN
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: podinfo
    #             port:
    #               number: 9898