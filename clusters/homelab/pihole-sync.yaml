---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pihole-sync
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ../infrastructure/homelab/pihole-sync
  prune: true
  # force allows Flux to delete and recreate the Job when its spec changes
  # (Jobs are immutable once created). This happens automatically whenever
  # pihole-config.yaml or sync.py changes, because the ConfigMap hash suffix
  # changes, which changes the volume reference in the Job spec.
  force: true
  wait: true
  # Gravity update takes ~10 minutes; 20 minutes provides enough headroom.
  timeout: 20m
  dependsOn:
    - name: infrastructure
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
