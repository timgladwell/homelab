---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../flux-system
patches:
  # kube-score/ignore annotations on Flux controllers — these are upstream manifests
  # managed by `flux bootstrap`. We cannot fix the flagged issues (UID/GID, ephemeral
  # storage limits, image pull policy, single-replica) without forking Flux's manifests,
  # so we suppress them explicitly with per-check justification:
  #
  #   container-image-pull-policy          — Flux pins digests in gotk-components.yaml;
  #                                          Always pull is unnecessary and wasteful
  #   container-ephemeral-storage-*        — Flux controllers don't declare these; upstream
  #                                          doesn't set them and we can't predict sizing
  #   container-security-context-user-group-id — Flux runs as uid/gid 65532 (nonroot),
  #                                          which is safe; >10000 rule doesn't apply here
  #   deployment-replicas                  — single-node homelab; HA replicas are N/A
  #   deployment-strategy (source only)    — source-controller uses Recreate intentionally
  #                                          to avoid two instances writing to the same PVC

  # yamllint disable rule:line-length
  - target:
      kind: Deployment
      name: source-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          kube-score/ignore: container-image-pull-policy,container-ephemeral-storage-request-and-limit,container-security-context-user-group-id,deployment-strategy,deployment-replicas
  - target:
      kind: Deployment
      name: kustomize-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          kube-score/ignore: container-image-pull-policy,container-ephemeral-storage-request-and-limit,container-security-context-user-group-id
  - target:
      kind: Deployment
      name: helm-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          kube-score/ignore: container-image-pull-policy,container-ephemeral-storage-request-and-limit,container-security-context-user-group-id
  - target:
      kind: Deployment
      name: notification-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          kube-score/ignore: container-image-pull-policy,container-ephemeral-storage-request-and-limit,container-security-context-user-group-id,deployment-replicas
  # yamllint enable rule:line-length
