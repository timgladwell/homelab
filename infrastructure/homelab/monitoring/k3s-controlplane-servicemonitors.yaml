---
# kube-controller-manager — K3s binds this to 0.0.0.0:10257 once
# kube-controller-manager-arg: "bind-address=0.0.0.0" is set in /etc/rancher/k3s/config.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-controller-manager
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-controller-manager
  endpoints:
    - port: https-metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      interval: 30s
---
# kube-scheduler — K3s binds this to 0.0.0.0:10259 once
# kube-scheduler-arg: "bind-address=0.0.0.0" is set in /etc/rancher/k3s/config.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-scheduler
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-scheduler
  endpoints:
    - port: https-metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      interval: 30s
---
# etcd — K3s binds metrics to 0.0.0.0:2381 once
# etcd-arg: "listen-metrics-urls=http://0.0.0.0:2381" is set in /etc/rancher/k3s/config.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-etcd
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
  endpoints:
    - port: http-metrics
      scheme: http
      interval: 30s
