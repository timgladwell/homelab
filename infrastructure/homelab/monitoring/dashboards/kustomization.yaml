---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
configMapGenerator:
  - name: dashboard-node-exporter-full
    files:
      - node-exporter-full.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: dashboard-pihole
    files:
      - pihole-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
