# Unbound recursive DNS resolver configuration
#
# Design:
#   - Listens on port 5335 (PiHole forwards to this port)
#   - Access-control restricts queries to PiHole only (k3s default pod CIDR)
#   - DNSSEC validation is strict: SERVFAIL is returned immediately on failure
#   - Recursive resolution against root servers (no forwarders)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: dns
data:
  unbound.conf: |
    server:
      verbosity: 1
      interface: 0.0.0.0
      port: 5335
      do-ip4: yes
      do-udp: yes
      do-tcp: yes
      do-ip6: no

      # Restrict to PiHole only - k3s default pod CIDR
      access-control: 0.0.0.0/0 refuse
      access-control: 127.0.0.1/32 allow
      access-control: 10.42.0.0/16 allow

      # DNSSEC - strict validation, fast-fail on any failure
      harden-glue: yes
      harden-dnssec-stripped: yes
      harden-algo-downgrade: yes
      val-permissive-mode: no
      val-log-level: 2
      auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

      # Disable cap randomisation - can cause DNSSEC failures
      use-caps-for-id: no

      # EDNS buffer (RFC 8020 recommendation)
      edns-buffer-size: 1232

      # Prefetch popular records before expiry
      prefetch: yes

      # Single thread - appropriate for RPi 4B
      num-threads: 1
      so-rcvbuf: 1m

    remote-control:
      control-enable: no
