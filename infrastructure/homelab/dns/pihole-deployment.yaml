---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: dns
  annotations:
    # pihole runs as root (required for DNS port binding) and needs a writable
    # filesystem for FTL runtime state; these checks cannot be satisfied.
    # Both probes intentionally verify DNS resolution via dig.
    # This is a single node deployment; single replica is sufficient for now.
    # NetworkPolicy is pending re-addition with podSelector (namespaceSelector
    # blocked pihole→unbound traffic under Flannel).
    kube-score/ignore: >-
      container-security-context-readonlyrootfilesystem,container-security-context-user-group-id,deployment-replicas,container-image-pull-policy,pod-probes-identical,pod-networkpolicy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: pihole
    spec:
      # No hostNetwork: MetalLB provides a stable external IP via the pihole-dns
      # LoadBalancer service. RollingUpdate is now safe because the old pod stays
      # alive (serving DNS) until the new pod passes its readiness probe.
      dnsPolicy: ClusterFirst
      containers:
        - name: pihole
          image: pihole/pihole:2026.04.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 8080
              protocol: TCP
          env:
            - name: TZ
              value: "America/Toronto"
            # Unbound is the sole upstream DNS resolver. Using the pinned
            # ClusterIP directly avoids a circular dependency at startup:
            # dnsmasq would fail to resolve the hostname before the pod network
            # is ready, causing CrashLoopBackOff. See unbound-service.yaml.
            - name: FTLCONF_dns_upstreams
              value: "10.43.0.53#5335"
            # No web UI password
            - name: FTLCONF_webserver_api_password
              value: ""
            - name: FTLCONF_webserver_port
              value: "8080"
            # PiHole is not the DHCP server
            - name: FTLCONF_dhcp_active
              value: "false"
            # Listen on all interfaces (required in Kubernetes pod networking)
            - name: FTLCONF_dns_listeningMode
              value: "all"
            # Block DNS bypass mechanisms
            - name: FTLCONF_dns_specialDomains_mozillaCanary
              value: "true"
            - name: FTLCONF_dns_specialDomains_iCloudPrivateRelay
              value: "true"
            - name: FTLCONF_dns_specialDomains_designatedResolver
              value: "true"
            - name: FTLCONF_dns_piholePTR
              value: "PI.HOLE"
          # DNS host records are split across two secret keys because the two FTL
          # mechanisms have complementary but non-overlapping capabilities:
          #
          # FTLCONF_dns_hosts (explicit records, e.g. "10.6.1.80 pi.hole"):
          #   FTL intercepts pi.hole queries before dnsmasq processes them, so an
          #   address= directive in dnsmasq_lines has no effect for this domain.
          #   dns_hosts entries are applied at the FTL layer and do take effect.
          #
          # FTLCONF_misc_dnsmasq_lines (wildcard, address=/${HOSTNAME}/...):
          #   Routes all *.homelab.home.arpa subdomains to Traefik automatically,
          #   so new apps get DNS without a manual entry. FTLCONF_dns_hosts has no
          #   wildcard support, so dnsmasq remains required for this. Do not remove
          #   dnsmasq_lines without first adding explicit dns_hosts entries for every
          #   app subdomain (pihole.homelab.home.arpa, grafana.homelab.home.arpa, ...).
          envFrom:
            - secretRef:
                name: pihole-secret
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
          readinessProbe:
            exec:
              command:
                - dig
                - +norecurse
                - +time=3
                - "@127.0.0.1"
                - pi.hole
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - dig
                - +norecurse
                - +time=3
                - "@127.0.0.1"
                - pi.hole
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pihole-config
