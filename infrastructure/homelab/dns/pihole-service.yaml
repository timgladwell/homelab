# Web UI service - routed via Traefik.
# DNS (port 53) is served directly from the host network via hostNetwork on the deployment.
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: dns
spec:
  selector:
    app: pihole
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
