---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  namespace: dns
  annotations:
    # unbound writes runtime state to /var/run/unbound; readOnlyRootFilesystem
    # requires mapping those paths which is outside what the upstream image guarantees.
    # Both probes intentionally query dnssec.works to confirm DNSSEC is active.
    # This is a single node deployment; single replica is sufficient for now.
    kube-score/ignore: >-
      container-security-context-readonlyrootfilesystem,container-security-context-user-group-id,pod-probes-identical,deployment-replicas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unbound
  template:
    metadata:
      labels:
        app: unbound
    spec:
      containers:
        - name: unbound
          image: klutchell/unbound:1.24.2
          imagePullPolicy: Always
          ports:
            - containerPort: 5335
              protocol: UDP
            - containerPort: 5335
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/unbound/custom.conf.d/unbound.conf
              subPath: unbound.conf
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command: ["drill-hc", "-p", "5335", "@127.0.0.1", "dnssec.works"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["drill-hc", "-p", "5335", "@127.0.0.1", "dnssec.works"]
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: unbound-config
