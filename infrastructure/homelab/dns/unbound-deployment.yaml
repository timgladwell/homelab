---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  namespace: dns
  annotations:
    # unbound writes runtime state to /var/run/unbound; readOnlyRootFilesystem
    # requires mapping those paths which is outside what the upstream image guarantees.
    # Both probes intentionally query dnssec.works to confirm DNSSEC is active.
    # This is a single node deployment; single replica is sufficient for now.
    # NetworkPolicy is pending re-addition with podSelector (namespaceSelector
    # blocked pihole→unbound traffic under Flannel).
    kube-score/ignore: >-
      container-security-context-readonlyrootfilesystem,container-security-context-user-group-id,pod-probes-identical,deployment-replicas,container-image-pull-policy,pod-networkpolicy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unbound
  template:
    metadata:
      labels:
        app: unbound
    spec:
      containers:
        - name: unbound-exporter
          image: cyb3rjak3/unbound-exporter:0.6.0
          imagePullPolicy: IfNotPresent
          args:
            - --unbound.host=tcp://127.0.0.1:8953
            - --unbound.ca=
            - --unbound.cert=
            - --unbound.key=
          ports:
            - name: metrics
              containerPort: 9167
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
        - name: unbound
          image: klutchell/unbound:v1.25.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5335
              protocol: UDP
            - containerPort: 5335
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/unbound/custom.conf.d/unbound.conf
              subPath: unbound.conf
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            exec:
              command: ["drill-hc", "-p", "5335", "@127.0.0.1", "dnssec.works"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["drill-hc", "-p", "5335", "@127.0.0.1", "dnssec.works"]
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: unbound-config
