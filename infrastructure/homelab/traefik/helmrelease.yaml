# infrastructure/traefik/helmrelease.yaml
#
# Routing strategy:
# - Each app uses subdomain-based routing: http://<app>.${DOMAIN}
# - Standard ports only (80/443) - no custom ports to remember
#
# Traefik dashboard route:
# - http://traefik.${DOMAIN}/dashboard/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 12h

  values:
    # Resource limits appropriate for RPi 4B
    resources:
      requests:
        cpu: 100m
        memory: 50Mi
      limits:
        cpu: 300m
        memory: 150Mi

    # Use host network for direct 80/443 access
    # Alternatives: LoadBalancer (requires MetalLB), NodePort (requires remembering ports)
    hostNetwork: true

    # Single replica (homelab constraints)
    # Recreate strategy required for hostNetwork - must release ports before new pod starts
    deployment:
      replicas: 1
      strategy:
        type: Recreate

    # Disable built-in dashboard IngressRoute - we'll create our own
    # This gives us full control over routing and middleware
    ingressRoute:
      dashboard:
        enabled: false

    # Define entry points - standard ports only
    ports:
      web:
        port: 8000
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 8443
        exposedPort: 443
        protocol: TCP
      traefik:
        port: 9000
        expose:
          default: false  # Dashboard accessed via web entrypoint, not dedicated port
        protocol: TCP

    # Enable Kubernetes CRD and Ingress providers
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: false

    additionalArguments:
      - "--api.insecure=true"  # Enable dashboard API (internal network only)
      - "--providers.kubernetesingress.ingressclass=traefik"

    # Logging for troubleshooting
    logs:
      general:
        level: INFO
      access:
        enabled: true
