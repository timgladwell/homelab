# infrastructure/traefik/helmrelease.yaml
#
# Routing strategy:
# - Each app uses subdomain-based routing: http://<app>.${HOSTNAME}
# - Standard ports only (80/443) - no custom ports to remember
#
# Traefik dashboard route:
# - http://traefik.${HOSTNAME}/dashboard/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "39.0.8"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 12h

  values:
    # Resource limits appropriate for RPi 4B
    # Traefik v3 startup allocations exceed 135Mi (GOMEMLIMIT at 90% of 150Mi),
    # causing the Go runtime to be killed before logging initialises → silent crash.
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    # Stable external IP provided by MetalLB - no hostNetwork needed.
    # The fixed IP survives pod restarts so DNS/bookmarks don't need updating.
    service:
      annotations:
        metallb.universe.tf/loadBalancerIPs: "${METALLB_TRAEFIK_IP}"

    # Single replica (homelab constraints).
    # RollingUpdate is now safe: old pod keeps accepting traffic until the new
    # pod passes its readiness probe, so there is no gap in HTTP/HTTPS routing.
    deployment:
      replicas: 1
      strategy:
        type: RollingUpdate

    # Disable built-in dashboard IngressRoute - we'll create our own
    # This gives us full control over routing and middleware
    ingressRoute:
      dashboard:
        enabled: false

    # Define entry points - standard ports only
    ports:
      web:
        port: 8000
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 8443
        exposedPort: 443
        protocol: TCP
      traefik:
        port: 9000
        expose:
          default: false  # Dashboard accessed via web entrypoint, not dedicated port
        protocol: TCP

    # Enable Kubernetes CRD and Ingress providers
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: false

    additionalArguments:
      - "--api.insecure=true"  # Enable dashboard API (internal network only)
      - "--providers.kubernetesingress.ingressclass=traefik"

    # Logging for troubleshooting
    logs:
      general:
        level: INFO
      access:
        enabled: true
