# Traefik dashboard IngressRoute
#
# Routes:
# - http://traefik.${HOSTNAME}/dashboard/ -> dashboard UI
# - http://traefik.${HOSTNAME}/api/*      -> dashboard API
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.${HOSTNAME}`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
