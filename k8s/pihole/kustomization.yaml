apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pihole

resources:
  - namespace.yaml
  # PiHole: DNS-based ad blocker
  - pihole-pvc.yaml
  - pihole-configmap.yaml
  - pihole-secret-template.yaml
  - pihole-deployment.yaml
  - pihole-service.yaml
  - pihole-serviceaccount.yaml
  # Adlist configuration - single source of truth stored in ConfigMap
  - configmap-adlists.yaml
  # Post-deployment job - runs automatically when PiHole is deployed
  # When the adlist ConfigMap (pihole-adlists) is updated, Flux CD will recreate this Job
  - pihole-post-deploy-job.yaml

# Note: Secrets should be created separately using the template
# Run: ./scripts/create-pihole-secret.sh with appropriate environment variables
