apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: networking

resources:
  - namespace.yaml

  # Unbound
  - unbound/unbound-configmap.yaml
  - unbound/unbound-deployment.yaml
  - unbound/unbound-netpol.yaml
  - unbound/unbound-service.yaml

  # PiHole
  # Adlist configuration - single source of truth stored in ConfigMap
  - pihole/configmap-adlists.yaml
  - pihole/pihole-configmap.yaml
  - pihole/pihole-deployment.yaml
  # Post-deployment job - runs automatically when PiHole is deployed
  # When the adlist ConfigMap (pihole-adlists) is updated, Flux CD will recreate this Job
  - pihole/pihole-post-deploy-job.yaml
  - pihole/pihole-pvc.yaml
  - pihole/pihole-secret-template.yaml
  - pihole/pihole-service.yaml
  - pihole/pihole-serviceaccount.yaml
