# yamllint disable rule:line-length

apiVersion: batch/v1
kind: Job
metadata:
  name: pihole-adlist-config
  namespace: networking
  annotations:
    # This Job runs when PiHole is deployed or when the adlist ConfigMap is updated
    # The ConfigMap (pihole-adlists) is the single source of truth for adlist subscriptions
    # When the ConfigMap changes, Flux CD will recreate this Job
    "fluxcd.io/ignore": "false"
    
    # Option for future infinite-loop issues, uncomment to have Flux kill and recreate the job
    # kustomize.toolkit.fluxcd.io/force: "enabled"
spec:
  # Set backoff limit to allow retries
  backoffLimit: 3
  activeDeadlineSeconds: 1200  # Kill Job after 20 minutes total, prevents being stuck in an unstartable state
  ttlSecondsAfterFinished: 3600  # Clean up job after 1 hour
  template:
    metadata:
      labels:
        app: pihole-adlist-config
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-pihole
          # Using Alpine for ARM64 compatibility - multi-arch support guaranteed
          # kubectl binary mounted from K3s host ensures version compatibility
          image: alpine:3.19
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PiHole pod to be ready..."
              max_attempts=60
              attempt=0

              while [ $attempt -lt $max_attempts ]; do
                POD_PHASE=$(/kubectl get pod -n networking -l app=pihole -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
                if [ "$POD_PHASE" = "Running" ]; then
                  PIHOLE_IP=$(/kubectl get pod -n networking -l app=pihole -o jsonpath='{.items[0].status.podIP}' 2>/dev/null || echo "")
                  if [ -n "$PIHOLE_IP" ]; then
                    # Write IP to shared volume for main container
                    echo "$PIHOLE_IP" > /shared/pihole-ip
                    echo "PiHole is ready at ${PIHOLE_IP}"
                    exit 0
                  fi
                fi
                attempt=$((attempt + 1))
                echo "Attempt ${attempt} of ${max_attempts} completed - sleeping for 5"
                sleep 5
              done

              echo "ERROR: PiHole did not become ready"
              exit 1
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: kubectl-binary
              mountPath: /kubectl
              readOnly: true
      containers:
        - name: configure-adlists
          image: curlimages/curl:8.17.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              # Read PiHole IP from shared volume
              PIHOLE_IP=$(cat /shared/pihole-ip 2>/dev/null || echo "")
              if [ -z "$PIHOLE_IP" ]; then
                echo "ERROR: Could not read PiHole IP"
                exit 1
              fi

              echo "Configuring PiHole adlists at ${PIHOLE_IP}..."

              # Function: Make API call with retries and response validation
              # Usage: api_call STEP_NAME [CURL_OPTIONS...]
              # Example: api_call "Test" -X GET "http://example.com"
              api_call() {
                local step_name="$1"
                shift
                local max_retries=3
                local retry_delay=5
                local attempt=1

                echo "[${step_name}] Starting API call..."

                while [ $attempt -le $max_retries ]; do
                  echo "[${step_name}] Attempt ${attempt}/${max_retries}"
                  
                  # Capture HTTP code and response body separately
                  http_code=$(curl -s -w "%{http_code}" -o /tmp/response.json \
                    --max-time 30 \
                    --connect-timeout 10 \
                    "$@" || echo "000")
                  
                  # Check for successful HTTP response (2xx)
                  if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
                    echo "[${step_name}] ✓ Success (HTTP ${http_code})"
                    cat /tmp/response.json
                    echo ""
                    return 0
                  fi
                  
                  # Log failure details
                  echo "[${step_name}] ✗ Failed with HTTP ${http_code}"
                  cat /tmp/response.json 2>/dev/null || echo "(no response body)"
                  echo ""
                  
                  # Exit immediately on client errors (4xx) - no point retrying
                  if [ "${http_code}" -ge 400 ] && [ "${http_code}" -lt 500 ]; then
                    echo "[${step_name}] Client error - not retrying"
                    return 1
                  fi
                  
                  # Retry on server errors (5xx) or network issues
                  if [ $attempt -lt $max_retries ]; then
                    echo "[${step_name}] Retrying in ${retry_delay}s..."
                    sleep $retry_delay
                    attempt=$((attempt + 1))
                  else
                    echo "[${step_name}] Max retries exceeded"
                    return 1
                  fi
                done
              }

              # Validate input files exist and are valid JSON
              echo "Validating configuration files..."
              for file in "${ALLOW_LIST_FILE}" "${BLOCK_LIST_FILE}"; do
                if [ ! -f "$file" ]; then
                  echo "ERROR: Configuration file not found: $file"
                  exit 1
                fi
                # Basic JSON validation (checks if jq can parse it)
                if ! cat "$file" | grep -q "{"; then
                  echo "ERROR: Invalid JSON in $file"
                  exit 1
                fi
              done
              echo "✓ Configuration files validated"

              #
              # TODO - query the existing lists and remove any lists that've been dropped from the configuration
              # GET http://${PIHOLE_IP}/api/lists?type=allow
              # GET http://${PIHOLE_IP}/api/lists?type=block
              # Compare with current config and DELETE orphaned lists
              #

              # Step 1: Update allow list
              api_call "AllowList" \
                -H "Content-Type: application/json" \
                -X POST \
                -d @"${ALLOW_LIST_FILE}" \
                "http://${PIHOLE_IP}/api/lists?type=allow"

              # Step 2: Update block list
              api_call "BlockList" \
                -H "Content-Type: application/json" \
                -X POST \
                -d @"${BLOCK_LIST_FILE}" \
                "http://${PIHOLE_IP}/api/lists?type=block"

              # Step 3: Trigger gravity update
              api_call "GravityUpdate" \
                -H "Content-Type: application/json" \
                -X POST \
                "http://${PIHOLE_IP}/api/action/gravity?color=true"

              echo "========================================="
              echo "PiHole adlist configuration completed successfully!"
              echo "========================================="
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: adlists
              mountPath: /adlists
          env:
            - name: ALLOW_LIST_FILE
              value: /adlists/allow_lists_request_body.json
            - name: BLOCK_LIST_FILE
              value: /adlists/block_lists_request_body.json
          # Resource limits prevent runaway processes on resource-constrained Pi
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "200m"
      volumes:
        - name: shared
          emptyDir: {}
        - name: adlists
          configMap:
            name: pihole-adlists
        # Mount kubectl binary from K3s host installation
        # This ensures ARM64 compatibility and matches cluster version
        - name: kubectl-binary
          hostPath:
            path: /usr/local/bin/kubectl
            type: File
      serviceAccountName: pihole-config-sa