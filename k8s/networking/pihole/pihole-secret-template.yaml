# Secret Template for PiHole
# This file contains placeholder values that must be replaced during deployment
# DO NOT commit actual secrets to the repository
apiVersion: v1
kind: Secret
metadata:
  name: pihole-secret
  namespace: networking
type: Opaque
stringData:
  # Internal network information - replace with actual values
  FTLCONF_dns_domain_name: "example.local"
  # Conditional forwarding reverse DNS configuration
  # Format: <enabled>,<cidr-ip-address-range>,<server-ip-address>,<domain>
  # Example for 192.168.0.0/16 subnet: "true,192.168.0.0/16,192.168.1.1,example.local"
  FTLCONF_dns_revServers: "true,192.168.0.0/16,192.168.1.1,example.local"
