apiVersion: v1
kind: ServiceAccount
metadata:
  name: pihole-config-sa
  namespace: networking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pihole-config-role
  namespace: networking
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pihole-config-rolebinding
  namespace: networking
subjects:
  - kind: ServiceAccount
    name: pihole-config-sa
    namespace: networking
roleRef:
  kind: Role
  name: pihole-config-role
  apiGroup: rbac.authorization.k8s.io
