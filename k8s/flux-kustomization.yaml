apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  timeout: 10m
  postBuild:
    substitute:
      # Placeholder for runtime substitutions if needed
      NAMESPACE: "pihole"
  # Health checks
  wait: true
  timeout: 10m


